# Voice Form Demo - Local Development Stack
# Run: docker-compose up -d

services:
  # Whisper.cpp - Local speech-to-text
  # API: POST /asr with multipart form data
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-stt
    ports:
      - "9000:9000"
    environment:
      # Model options: tiny, base, small, medium, large
      # base.en is a good balance of speed and accuracy for English
      - ASR_MODEL=base.en
      - ASR_ENGINE=faster_whisper
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Ollama - Local LLM for field extraction
  # API: POST /api/generate
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped
    # Note: After starting, pull the model:
    # docker exec -it ollama ollama pull llama3.2:3b

volumes:
  whisper-models:
    name: voiceform-whisper-models
  ollama-models:
    name: voiceform-ollama-models
