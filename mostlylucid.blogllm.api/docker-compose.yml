version: '3.8'

services:
  blogllm-api:
    build:
      context: ..
      dockerfile: mostlylucid.blogllm.api/Dockerfile
    container_name: blogllm-api
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - BlogRag__VectorStore__Host=qdrant
      - BlogRag__VectorStore__Port=6334
    volumes:
      # Mount your models directory
      - ./models:/app/models:ro
    depends_on:
      - qdrant
    networks:
      - blogllm-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - blogllm-network
    restart: unless-stopped

networks:
  blogllm-network:
    driver: bridge

volumes:
  qdrant_storage:
