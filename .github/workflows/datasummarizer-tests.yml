name: DataSummarizer Tests

on:
  push:
    paths:
      - 'Mostlylucid.DataSummarizer/**'
      - '.github/workflows/datasummarizer-tests.yml'
  pull_request:
    paths:
      - 'Mostlylucid.DataSummarizer/**'

jobs:
  test:
    name: Test DataSummarizer
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Restore dependencies
        run: dotnet restore Mostlylucid.DataSummarizer/Mostlylucid.DataSummarizer.csproj
      
      - name: Build
        run: dotnet build Mostlylucid.DataSummarizer/Mostlylucid.DataSummarizer.csproj -c Release --no-restore
      
      - name: Run unit tests
        run: dotnet test Mostlylucid.DataSummarizer/Mostlylucid.DataSummarizer.Tests/Mostlylucid.DataSummarizer.Tests.csproj --no-restore --verbosity normal
      
      - name: Run integration tests
        run: |
          cd Mostlylucid.DataSummarizer
          chmod +x test-all-features.sh
          bash test-all-features.sh
      
      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: Mostlylucid.DataSummarizer/test-outputs/
          retention-days: 7
