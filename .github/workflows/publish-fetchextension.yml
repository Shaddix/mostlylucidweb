name: Publish Markdig.FetchExtension

on:
  push:
    tags:
      - 'fetchextension-v*.*.*'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Extract version from tag
      id: get_version
      run: |
        TAG=${GITHUB_REF#refs/tags/fetchextension-v}
        echo "VERSION=$TAG" >> $GITHUB_OUTPUT
        echo "Publishing version: $TAG"

    - name: Restore dependencies
      run: dotnet restore Mostlylucid.Markdig.FetchExtension/Mostlylucid.Markdig.FetchExtension.csproj

    - name: Build
      run: dotnet build Mostlylucid.Markdig.FetchExtension/Mostlylucid.Markdig.FetchExtension.csproj --configuration Release --no-restore -p:Version=${{ steps.get_version.outputs.VERSION }}

    - name: Run tests
      run: dotnet test Mostlylucid.Markdig.FetchExtension.Tests/Mostlylucid.Markdig.FetchExtension.Tests.csproj --configuration Release --verbosity normal

    - name: Update package version
      if: ${{ steps.get_version.outputs.VERSION != '' }}
      run: |
        sed -i 's#<Version>.*</Version>#<Version>${{ steps.get_version.outputs.VERSION }}</Version>#' Mostlylucid.Markdig.FetchExtension/Mostlylucid.Markdig.FetchExtension.csproj

    - name: Pack
      run: dotnet pack Mostlylucid.Markdig.FetchExtension/Mostlylucid.Markdig.FetchExtension.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.get_version.outputs.VERSION }} --output ./artifacts


    - name: Login to NuGet (OIDC)
      id: nuget_login
      uses: NuGet/login@v1
      with:
        user: 'mostlylucid'

    - name: Publish to NuGet (Trusted Publisher)
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ steps.nuget_login.outputs.NUGET_AUTH_TOKEN }} \
          --skip-duplicate

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg

