name: Release DataSummarizer

on:
  push:
    tags:
      - 'datasummarizer-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  
env:
  PROJECT_PATH: Mostlylucid.DataSummarizer/Mostlylucid.DataSummarizer.csproj
  PROJECT_NAME: Mostlylucid.DataSummarizer
  TEST_PROJECT_PATH: Mostlylucid.DataSummarizer/Mostlylucid.DataSummarizer.Tests/Mostlylucid.DataSummarizer.Tests.csproj

jobs:
  # Run tests first (only once, not for each platform)
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore ${{ env.TEST_PROJECT_PATH }}

    - name: Run unit tests
      run: |
        dotnet test ${{ env.TEST_PROJECT_PATH }} \
          --configuration Release \
          --logger "console;verbosity=normal"

  build:
    needs: test
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            rid: win-x64
            artifact_name: datasummarizer-win-x64
            executable: datasummarizer.exe
          # Windows ARM64 - cross-compile from x64
          - os: windows-latest
            rid: win-arm64
            artifact_name: datasummarizer-win-arm64
            executable: datasummarizer.exe
          # Linux x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: datasummarizer-linux-x64
            executable: datasummarizer
          # Linux ARM64 - use ARM64 runner
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: datasummarizer-linux-arm64
            executable: datasummarizer
          # macOS x64 (Intel) - use macos-15-intel
          - os: macos-15-intel
            rid: osx-x64
            artifact_name: datasummarizer-osx-x64
            executable: datasummarizer
          # macOS ARM64 (Apple Silicon) - macos-latest is ARM64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: datasummarizer-osx-arm64
            executable: datasummarizer

    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Extract version from tag
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/datasummarizer-v}
        fi
        # Strip leading 'v' if present (dotnet version strings can't have 'v' prefix)
        VERSION=${VERSION#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build and Publish (self-contained single file)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r ${{ matrix.rid }} \
          --self-contained \
          -p:Version=${{ steps.get_version.outputs.VERSION }} \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -o ./publish/${{ matrix.rid }}
      shell: bash

    - name: List published files
      run: ls -la ./publish/${{ matrix.rid }}/
      shell: bash

    - name: Verify required files exist
      run: |
        cd ./publish/${{ matrix.rid }}
        echo "Checking for required files..."
        ls -la appsettings.json README.md ${{ matrix.executable }}
        echo "All required files present!"
      shell: bash

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      run: |
        cd ./publish/${{ matrix.rid }}
        # Include exe, native dlls (duckdb, onnx), config, and readme
        # Exclude .lib, .pdb, and managed dlls (bundled in single file)
        7z a -tzip ../../${{ matrix.artifact_name }}.zip ${{ matrix.executable }} duckdb.dll onnxruntime*.dll appsettings.json README.md
      shell: bash

    - name: Create archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd ./publish/${{ matrix.rid }}
        chmod +x ${{ matrix.executable }}
        # Include executable, native libs (.so/.dylib), config, and readme
        if ls *.so 1> /dev/null 2>&1; then
          tar -czvf ../../${{ matrix.artifact_name }}.tar.gz ${{ matrix.executable }} *.so appsettings.json README.md
        elif ls *.dylib 1> /dev/null 2>&1; then
          tar -czvf ../../${{ matrix.artifact_name }}.tar.gz ${{ matrix.executable }} *.dylib appsettings.json README.md
        else
          tar -czvf ../../${{ matrix.artifact_name }}.tar.gz ${{ matrix.executable }} appsettings.json README.md
        fi
      shell: bash

    - name: Upload artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.zip
        if-no-files-found: error

    - name: Upload artifact (Unix)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.tar.gz
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/datasummarizer-v}
        fi
        # Strip leading 'v' if present (dotnet version strings can't have 'v' prefix)
        VERSION=${VERSION#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        merge-multiple: true

    - name: List artifacts
      run: |
        echo "=== Artifacts directory structure ==="
        find ./artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \)
        echo "=== All files ==="
        ls -laR ./artifacts/
        echo "=== Files to upload ==="
        find ./artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) | wc -l
        echo "archive files found"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: DataSummarizer v${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('datasummarizer-v{0}', github.event.inputs.version) || github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## DataSummarizer v${{ steps.get_version.outputs.VERSION }}
          
          > **Statistics-first data profiling with DuckDB - compute facts first, then optionally narrate with a local LLM.**
          
          **[Full Documentation](https://github.com/${{ github.repository }}/blob/main/Mostlylucid.DataSummarizer/README.md)** | **[Introduction Article](https://mostlylucid.net/blog/datasummarizer-how-it-works)**
          
          ### Key Features
          
          - **DuckDB-First** - Stream data directly from files, handles datasets larger than RAM
          - **Statistical Profiling** - Row/column counts, nulls, uniques, quantiles, distributions, correlations
          - **Smart Alerts** - Target imbalance, potential leakage, outliers, zero-inflation, data quality issues
          - **Target Analysis** - Feature effects with Cohen's d and rate deltas (supervised analysis without modeling)
          - **Pattern Detection** - Email, UUID, phone, novel patterns + distribution shape labeling
          - **Constraint Validation** - Auto-generate data contracts and validate against them (drift detection)
          - **Segment Comparison** - Compare datasets, cohorts, or time periods (A/B profiling)
          - **LLM Integration** - Optional Ollama-powered insights + SQL generation (works offline without LLM)
          - **JSON Tool Mode** - Structured output for MCP tools and AI agents
          - **Synthetic Data** - Generate realistic test data from profiles
          - **Multi-Dataset Registry** - Ingest and search across many datasets
          
          ### Downloads
          
          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | Windows | x64 | `datasummarizer-win-x64.zip` |
          | Windows | ARM64 | `datasummarizer-win-arm64.zip` |
          | Linux | x64 | `datasummarizer-linux-x64.tar.gz` |
          | Linux | ARM64 | `datasummarizer-linux-arm64.tar.gz` |
          | macOS | x64 (Intel) | `datasummarizer-osx-x64.tar.gz` |
          | macOS | ARM64 (Apple Silicon) | `datasummarizer-osx-arm64.tar.gz` |
          
          ### Quick Start
          
          **Default (full profile with LLM narrative - most detailed):**
          ```bash
          ./datasummarizer -f data.csv --model qwen2.5-coder:7b
          ```
          
          **Super fast mode (stats only, no LLM - fastest):**
          ```bash
          ./datasummarizer -f data.csv --no-llm --fast
          ```
          
          **Target-aware analysis (analyze feature effects on label):**
          ```bash
          ./datasummarizer -f customers.csv --target Churned --no-llm
          ```
          
          **Generate and validate constraints (data contracts):**
          ```bash
          # Generate constraints from production data
          ./datasummarizer validate --source production.csv --target test.csv \
            --generate-constraints --output constraints.json --no-llm
          
          # Validate new data against constraints
          ./datasummarizer validate --source production.csv --target new_batch.csv \
            --constraints constraints.json --format markdown --strict
          ```
          
          **Compare datasets (segment comparison):**
          ```bash
          ./datasummarizer segment --segment-a production.csv --segment-b synthetic.csv --format markdown
          ```
          
          **Generate synthetic data:**
          ```bash
          ./datasummarizer profile -f original.csv --output profile.json
          ./datasummarizer synth --profile profile.json --synthesize-to synthetic.csv --synthesize-rows 10000
          ```
          
          **JSON output for AI agents/pipelines:**
          ```bash
          ./datasummarizer tool -f data.csv --target Revenue
          ```
          
          ### With LLM (Enhanced Insights)
          
          ```bash
          # Install Ollama from https://ollama.ai, then:
          ollama pull qwen2.5-coder:7b && ollama serve
          
          ./datasummarizer -f data.csv --model qwen2.5-coder:7b
          ```
          
          ### Supported Formats
          
          | Format | Extension | Notes |
          |--------|-----------|-------|
          | CSV | .csv | Auto-detects delimiter |
          | Excel | .xlsx, .xls | Specify sheet with `-s` |
          | Parquet | .parquet | Full support |
          | JSON | .json | Auto-infers schema |
          
          ### Statistics Calculated
          
          **Numeric Columns:**
          - Mean, Median, StdDev, MAD (robust)
          - Quartiles (Q25, Q50, Q75), IQR
          - Skewness, Kurtosis
          - Coefficient of Variation
          - Outlier count (IQR method)
          - Zero count (for sparse data)
          - Distribution type (Normal, Uniform, Skewed, Bimodal)
          - Trend detection (with R²)
          
          **Categorical Columns:**
          - Unique count, Top values
          - Mode, Imbalance ratio
          - Shannon Entropy (information content)
          - Ordinal detection
          
          **Text Columns:**
          - Length stats (min, max, avg)
          - Empty string count
          - Pattern detection (Email, URL, Phone, UUID, etc.)
          - Novel pattern discovery with regex generation
          
          **DateTime Columns:**
          - Date range and span
          - Time series granularity
          - Gap detection
          - Seasonality detection
          
          ### Prerequisites
          
          **For basic profiling:** None - works completely standalone!
          
          **For LLM-enhanced insights:** [Ollama](https://ollama.ai/) with any model
          
        files: |
          ./artifacts/**/*.zip
          ./artifacts/**/*.tar.gz
