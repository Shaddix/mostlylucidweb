name: Release DocSummarizer

on:
  push:
    tags:
      - 'docsummarizer-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  
env:
  PROJECT_PATH: Mostlylucid.DocSummarizer/Mostlylucid.DocSummarizer.csproj
  PROJECT_NAME: Mostlylucid.DocSummarizer

jobs:
  build:
    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            rid: win-x64
            artifact_name: docsummarizer-win-x64
            executable: docsummarizer.exe
          # Windows ARM64 - cross-compile from x64 (works for .NET AOT on Windows)
          - os: windows-latest
            rid: win-arm64
            artifact_name: docsummarizer-win-arm64
            executable: docsummarizer.exe
          # Linux x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: docsummarizer-linux-x64
            executable: docsummarizer
          # Linux ARM64 - use ARM64 runner
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: docsummarizer-linux-arm64
            executable: docsummarizer
          # macOS x64 (Intel) - use macos-15-intel
          - os: macos-15-intel
            rid: osx-x64
            artifact_name: docsummarizer-osx-x64
            executable: docsummarizer
          # macOS ARM64 (Apple Silicon) - macos-latest is ARM64
          - os: macos-latest
            rid: osx-arm64
            artifact_name: docsummarizer-osx-arm64
            executable: docsummarizer

    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Extract version from tag
      id: get_version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/docsummarizer-v}
        fi
        # Strip leading 'v' if present (dotnet version strings can't have 'v' prefix)
        VERSION=${VERSION#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build and Publish Native AOT
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r ${{ matrix.rid }} \
          --self-contained \
          -p:Version=${{ steps.get_version.outputs.VERSION }} \
          -p:PublishAot=true \
          -p:PublishTrimmed=true \
          -o ./publish/${{ matrix.rid }}
      shell: bash

    - name: List published files
      run: ls -la ./publish/${{ matrix.rid }}/
      shell: bash

    - name: Create archive (Windows)
      if: runner.os == 'Windows'
      run: |
        cd ./publish/${{ matrix.rid }}
        7z a -tzip ../../${{ matrix.artifact_name }}.zip ${{ matrix.executable }} appsettings.json README.md
      shell: bash

    - name: Create archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd ./publish/${{ matrix.rid }}
        chmod +x ${{ matrix.executable }}
        tar -czvf ../../${{ matrix.artifact_name }}.tar.gz ${{ matrix.executable }} appsettings.json README.md
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.artifact_name }}.zip
          ${{ matrix.artifact_name }}.tar.gz
        if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION=${GITHUB_REF#refs/tags/docsummarizer-v}
        fi
        # Strip leading 'v' if present (dotnet version strings can't have 'v' prefix)
        VERSION=${VERSION#v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
        merge-multiple: true

    - name: List artifacts
      run: |
        echo "=== Artifacts directory structure ==="
        find ./artifacts -type f -name "*.zip" -o -name "*.tar.gz" | head -20
        echo "=== All files ==="
        ls -laR ./artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: DocSummarizer v${{ steps.get_version.outputs.VERSION }}
        tag_name: ${{ github.event_name == 'workflow_dispatch' && format('docsummarizer-v{0}', github.event.inputs.version) || github.ref_name }}
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
        generate_release_notes: true
        body: |
          ## DocSummarizer v${{ steps.get_version.outputs.VERSION }}
          
          A local-first document summarization tool using LLMs (Ollama), vector search (Qdrant), and document conversion (Docling).
          
          ### Features
          - **Native AOT compiled** - Fast startup, minimal memory footprint
          - **Multiple summarization modes** - MapReduce, RAG, Iterative
          - **Rich progress feedback** - Spectre.Console terminal UI
          - **10-minute timeout** - Handles large documents and slow models
          - **Batch processing** - Process entire directories
          
          ### Downloads
          
          | Platform | Architecture | Download |
          |----------|--------------|----------|
          | Windows | x64 | `docsummarizer-win-x64.zip` |
          | Windows | ARM64 | `docsummarizer-win-arm64.zip` |
          | Linux | x64 | `docsummarizer-linux-x64.tar.gz` |
          | Linux | ARM64 | `docsummarizer-linux-arm64.tar.gz` |
          | macOS | x64 (Intel) | `docsummarizer-osx-x64.tar.gz` |
          | macOS | ARM64 (Apple Silicon) | `docsummarizer-osx-arm64.tar.gz` |
          
          ### Quick Start
          
          ```bash
          # Extract and run
          ./docsummarizer --help
          
          # Check dependencies
          ./docsummarizer check --verbose
          
          # Summarize a document
          ./docsummarizer -f document.pdf -v
          ```
          
          ### Prerequisites
          
          - [Ollama](https://ollama.ai/) with models: `ollama pull ministral-3:3b && ollama pull nomic-embed-text`
          - [Docling](https://github.com/docling-project/docling-serve): `docker run -p 5001:5001 quay.io/docling-project/docling-serve`
          - [Qdrant](https://qdrant.tech/) (for RAG mode): `docker run -p 6333:6333 -p 6334:6334 qdrant/qdrant`
          
        files: |
          ./artifacts/**/*.zip
          ./artifacts/**/*.tar.gz
