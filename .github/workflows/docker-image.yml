name: Docker Image CI

on:
  push:
    tags:
      - 'release-*'
      - 'local-*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USER_NAME }}" --password-stdin

      - name: Build and tag the Docker image
        id: build
        run: |
          TIMESTAMP=$(date +%s)
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

          # Extract the tag name
          TAG_NAME=${GITHUB_REF#refs/tags/}

          # Determine Docker tags based on git tag pattern
          if [[ "$TAG_NAME" == local-* ]]; then
            # local-* tags go to :local
            TAGS="${{ secrets.DOCKER_HUB_USER_NAME }}/mostlylucid:local"
            ADDITIONAL_TAG="${{ secrets.DOCKER_HUB_USER_NAME }}/mostlylucid:$TIMESTAMP-local"
            echo "IS_LOCAL=true" >> $GITHUB_ENV
          else
            # release-* tags go to :latest
            TAGS="${{ secrets.DOCKER_HUB_USER_NAME }}/mostlylucid:latest"
            ADDITIONAL_TAG="${{ secrets.DOCKER_HUB_USER_NAME }}/mostlylucid:$TIMESTAMP"
            echo "IS_LOCAL=false" >> $GITHUB_ENV
          fi

          echo "TAGS=$TAGS" >> $GITHUB_ENV
          echo "ADDITIONAL_TAG=$ADDITIONAL_TAG" >> $GITHUB_ENV

          # Build the Docker image
          docker build . --file Mostlylucid/Dockerfile --tag $TAGS --tag $ADDITIONAL_TAG

      - name: Push the Docker image to Docker Hub
        run: |
          docker push ${{ env.TAGS }}
          docker push ${{ env.ADDITIONAL_TAG }}