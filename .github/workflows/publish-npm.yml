name: Publish to npm

on:
  push:
    tags:
      - 'ml-mermaidv*'  # Triggers on tags like ml-mermaidv1.0.0, ml-mermaidv1.1.1, etc.
  workflow_dispatch:  # Allow manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Need write to update package.json and create release
      id-token: write  # Required for provenance

    defaults:
      run:
        working-directory: mostlylucid-mermaid

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning
          # When triggered by a tag, this checks out the exact commit that was tagged
          # This ensures we build and publish the exact code that was tagged,
          # regardless of which branch the tag was created from

      - name: Display checkout info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref Type: ${{ github.ref_type }}"
          echo "Ref Name: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          git log -1 --pretty=format:"Commit: %H%nAuthor: %an <%ae>%nDate: %ad%nMessage: %s" --date=iso

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Extract version from tag (e.g., ml-mermaidv1.2.3 -> 1.2.3)
            VERSION=$(echo ${GITHUB_REF#refs/tags/ml-mermaidv})
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "📦 Version from tag: $VERSION"

            # Show which commit this tag points to
            echo "🏷️  Tag ${{ github.ref_name }} points to commit:"
            git show --no-patch --format="  %H - %s (%an, %ar)"
          else
            # For manual workflow_dispatch, use version from package.json
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "📦 Version from package.json: $VERSION"
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            echo "Expected format: X.Y.Z or X.Y.Z-suffix (e.g., 1.2.3 or 1.2.3-beta.1)"
            exit 1
          fi
          echo "✅ Valid version format: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Update package.json version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Updating package.json to version $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version
          echo "✅ Updated package.json"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build:all

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          echo "✅ Build successful - dist directory exists"
          echo ""
          echo "📦 Build Output:"
          ls -lh dist/
          echo ""
          echo "📊 Minified Files:"
          ls -lh dist/*.min.js | awk '{print "  " $9 ": " $5}'

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Display CDN URLs
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo ""
          echo "🎉 Package published successfully!"
          echo ""
          echo "📦 npm Package:"
          echo "   https://www.npmjs.com/package/@mostlylucid/mermaid-enhancements/v/$VERSION"
          echo ""
          echo "🌐 CDN URLs (available in 2-5 minutes):"
          echo ""
          echo "unpkg:"
          echo "   https://unpkg.com/@mostlylucid/mermaid-enhancements@$VERSION"
          echo "   https://unpkg.com/@mostlylucid/mermaid-enhancements@$VERSION/dist/index.min.js"
          echo ""
          echo "jsdelivr:"
          echo "   https://cdn.jsdelivr.net/npm/@mostlylucid/mermaid-enhancements@$VERSION"
          echo "   https://cdn.jsdelivr.net/npm/@mostlylucid/mermaid-enhancements@$VERSION/dist/index.min.js"
          echo ""
          echo "💡 Verify CDN availability:"
          echo "   npm run verify-cdn"
          echo ""

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: actions/create-release@v1
        env:
          # GITHUB_TOKEN is automatically provided by GitHub Actions
          # You don't need to add this to secrets - it's already there!
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: v${{ steps.get_version.outputs.version }}
          body: |
            ## @mostlylucid/mermaid-enhancements v${{ steps.get_version.outputs.version }}

            🎉 Published to npm: https://www.npmjs.com/package/@mostlylucid/mermaid-enhancements/v/${{ steps.get_version.outputs.version }}

            ### Installation
            ```bash
            npm install @mostlylucid/mermaid-enhancements@${{ steps.get_version.outputs.version }}
            ```

            ### Changes
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/mostlylucid-mermaid/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
