services:
  mostlylucid:
    image: scottgal/mostlylucid:latest
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    environment:
      - Auth__GoogleClientId=${AUTH_GOOGLECLIENTID}
      - Auth__GoogleClientSecret=${AUTH_GOOGLECLIENTSECRET}
      - Auth__AdminUserGoogleId=${AUTH_ADMINUSERGOOGLEID}
      - SmtpSettings__UserName=${SMTPSETTINGS_USERNAME}
      - SmtpSettings__Password=${SMTPSETTINGS_PASSWORD}
      - Analytics__UmamiPath=${ANALYTICS_UMAMIPATH}
      - Analytics__WebsiteId=${ANALYTICS_WEBSITEID}
      - Analytics__User=${ANALYTICS_USER}
      - Analytics__Password=${ANALYTICS_PASSWORD}
      - ConnectionStrings__DefaultConnection=${POSTGRES_CONNECTIONSTRING}
      - TranslateService__ServiceIPs=${EASYNMT_IPS}
      - Serilog__WriteTo__0__Args__apiKey=${SEQ_API_KEY}
      - Markdown__MarkdownPath=${MARKDOWN_MARKDOWNPATH}
      - Markdown__MarkdownTranslatedPath=${MARKDOWN_MARKDOWNTRANSLATEDPATH}
      - CertPassword=${CERT_PASSWORD}
      - SemanticSearch__Enabled=${SEMANTICSEARCH_ENABLED}
      - SemanticSearch__QdrantUrl=http://qdrant:6333
      - SemanticSearch__CollectionName=${SEMANTICSEARCH_COLLECTIONNAME}
      - SemanticSearch__EmbeddingModelPath=${SEMANTICSEARCH_EMBEDDINGMODELPATH}
      - SemanticSearch__VocabPath=${SEMANTICSEARCH_VOCABPATH}
      - SemanticSearch__VectorSize=${SEMANTICSEARCH_VECTORSIZE}
      - SemanticSearch__RelatedPostsCount=${SEMANTICSEARCH_RELATEDPOSTSCOUNT}
      - SemanticSearch__MinimumSimilarityScore=${SEMANTICSEARCH_MINIMUMSIMILARITYSCORE}
      - SemanticSearch__SearchResultsCount=${SEMANTICSEARCH_SEARCHRESULTSCOUNT}
    volumes:
      - /mnt/imagecache:/app/wwwroot/cache
      - /mnt/logs:/app/logs
      - /mnt/markdown:/app/markdown
      - ./mostlylucid.pfx:/app/mostlylucid.pfx
      - /mnt/articleimages:/app/wwwroot/articleimages
      - /mnt/mostlylucid/uploads:/app/wwwroot/uploads
      - mlmodels:/app/mlmodels
    networks:
      - app_network
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
    command: --interval 300 # Check for updates every 300 seconds (5 minutes)
  db:
    image: postgres:16-alpine
    #    ports:
    #      - 5266:5432
    env_file:
      - .env
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - /mnt/umami/postgres:/var/lib/postgresql/data
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    env_file:
      - .env
    restart: always
    networks:
      - app_network
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_TYPE: ${DATABASE_TYPE}
      HASH_SALT: ${HASH_SALT}
      APP_SECRET: ${APP_SECRET}
      TRACKER_SCRIPT_NAME: getinfo
      API_COLLECT_ENDPOINT: all
    depends_on:
      - db
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - app_network
    restart: always
  easynmt:
    container_name: easynmt
    image: scottgal/mostlylucid-nmt:cpu
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          memory: 4G
    environment:
      # Model caching - keep 10 models loaded
      - MAX_CACHED_MODELS=10
      - MODEL_CACHE_DIR=/models
      
      # CPU-optimized performance
      - WEB_CONCURRENCY=4
      - MAX_WORKERS_BACKEND=4
      - MAX_INFLIGHT_TRANSLATIONS=4
      - EASYNMT_BATCH_SIZE=16
      
      # Queue management
      - ENABLE_QUEUE=1
      - MAX_QUEUE_SIZE=1000
      
      # Memory management for small machine
      - ENABLE_MEMORY_MONITOR=1
      - MEMORY_WARNING_THRESHOLD=75
      - MEMORY_CRITICAL_THRESHOLD=85
      
      # Evict idle models after 30 minutes to free memory
      - MODEL_IDLE_TIMEOUT=1800
      - IDLE_CHECK_INTERVAL=60
      
      # Fast shutdown
      - GRACEFUL_TIMEOUT=5
      
      # Markdown sanitization (prevents Markdig errors)
      - MARKDOWN_SANITIZE=1
      - MARKDOWN_SAFE_MODE_AUTO=1
      
      # Logging
      - LOG_LEVEL=INFO
    volumes:
      - ./model-cache:/models
    ports:
      - "5000:8000"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  
  caddy:
    image: caddy:latest
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_network
    restart: always
  seq:
    image: datalust/seq
    container_name: seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORDHASH: ${SEQ_DEFAULT_HASH}
    volumes:
      - /mnt/seq:/data
    networks:
      - app_network
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - app_network
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - app_network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=testpassword1234
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    networks:
      - app_network
    restart: unless-stopped
    volumes:
      - '/:/host:ro,rslave'
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - app_network
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
volumes:
  grafana-data:
  caddy_data:
  caddy_config:
  prometheus-data:
  qdrant-data:
  mlmodels:
    external: true
    name: mostlylucidweb_mlmodels
networks:
  app_network:
    driver: bridge

